<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>Đang xem - THAITHINHTV</title>

  <!-- Favicon -->
  <link rel="icon" href="assets/logo.png" type="image/png">

  <!-- HLS.js for m3u8 streams -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>

  <!-- FLV.js for FLV streams -->
  <script src="https://cdn.jsdelivr.net/npm/flv.js@latest/dist/flv.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      background: #0f172a;
      margin: 0;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      color: #fff;
    }

    .header-bar {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      background: rgba(0, 0, 0, 0.4);
      gap: 20px;
    }

    .player-back-btn {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      transition: background 0.2s;
    }
    .player-back-btn:focus, .player-back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      outline: 2px solid #e8203a;
    }

    .match-meta {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .match-competition {
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
    }

    .match-title {
      font-size: 18px;
      font-weight: 700;
    }

    .player-container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      background: #000;
      aspect-ratio: 16 / 9;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    #video-player {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .channel-section {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 20px;
      width: 100%;
      box-sizing: border-box;
    }

    .channel-label {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .channel-list {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 12px;
    }

    .channel-btn {
      background: rgba(255,255,255,0.1);
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 10px 16px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: max-content;
    }

    .channel-btn:focus, .channel-btn:hover {
      background: rgba(255,255,255,0.2);
      border-color: #fff;
    }

    .channel-btn.active {
      background: #e8203a;
      border-color: #ff4d65;
    }

    /* Loading overlay */
    .player-loading {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.5);
      z-index: 5;
      pointer-events: none;
    }
    .player-loading.show {
      display: flex;
    }
    .player-loading__spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #e8203a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error overlay */
    #player-error {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.8);
      z-index: 10;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      padding: 10px 20px;
      border-radius: 20px;
      display: none;
      z-index: 100;
    }
    .toast.show {
      display: block;
    }
  </style>
</head>
<body>

  <div class="header-bar">
    <a href="index.html" class="player-back-btn" id="back-btn" tabindex="0">
      ← Trở lại
    </a>
    <div class="match-meta">
      <div class="match-competition" id="player-competition">Đang tải...</div>
      <div class="match-title">
        <span id="player-home">-</span>
        <span id="player-score" style="margin: 0 8px; color: #e8203a;">-</span>
        <span id="player-away">-</span>
      </div>
    </div>
  </div>

  <div class="player-container">
    <!-- VIDEO ELEMENT WITH CONTROLS -->
    <video id="video-player"
           playsinline
           autoplay
           controls
           preload="auto">
      Trình duyệt của bạn không hỗ trợ phát video.
    </video>

    <!-- LOADING -->
    <div class="player-loading" id="player-loading">
      <div class="player-loading__spinner"></div>
    </div>

    <!-- ERROR -->
    <div id="player-error">
      <div style="font-size: 24px; margin-bottom: 10px;">📡</div>
      <div id="player-error-msg" style="margin-bottom: 16px;">Không thể tải stream</div>
      <button id="retry-btn" style="padding: 8px 16px; cursor: pointer;">Thử lại</button>
    </div>
  </div>

  <div class="channel-section">
    <div class="channel-label">📺 Chọn kênh / Bình luận viên</div>
    <div class="channel-list" id="channel-list">
      <!-- Channels rendered by JS -->
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- SCRIPTS -->
  <script src="js/api.js"></script>
  <script src="js/player.js"></script>

  <script>
    const video = document.getElementById('video-player');
    const loadingOverlay = document.getElementById('player-loading');

    video.addEventListener('waiting', () => {
      loadingOverlay.classList.add('show');
    });
    video.addEventListener('playing', () => {
      loadingOverlay.classList.remove('show');
    });
    video.addEventListener('canplay', () => {
      loadingOverlay.classList.remove('show');
    });

    // Try to ensure volume is on
    video.volume = 1.0;
    video.muted = false;

    // Handle back button specifically for TV
    document.getElementById('back-btn').addEventListener('click', (e) => {
      e.preventDefault();
      if (window.hls) { window.hls.destroy(); }
      window.location.href = 'index.html';
    });
  </script>

</body>
</html>
